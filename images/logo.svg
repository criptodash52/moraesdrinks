<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 80" width="100%" height="100%">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a853" />
      <stop offset="50%" stop-color="#e8c97a" />
      <stop offset="100%" stop-color="#b8923e" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Stylized Cocktail Glass Icon -->
  <g transform="translate(10, 15)">
    <!-- Glass bowl -->
    <path d="M 0 0 L 40 0 L 20 25 Z" fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Stem -->
    <line x1="20" y1="25" x2="20" y2="45" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Base -->
    <line x1="10" y1="45" x2="30" y2="45" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Liquid / Accent line -->
    <path d="M 5 6 L 35 6" stroke="url(#gold)" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Typography -->
  <g transform="translate(65, 45)">
    <text x="0" y="0" font-family="'Playfair Display', Georgia, serif" font-size="34" font-weight="700" fill="#f5f0e8" letter-spacing="1">MORAES</text>
    <text x="155" y="0" font-family="'Playfair Display', Georgia, serif" font-size="34" font-weight="700" fill="url(#gold)" letter-spacing="1">DRINKS</text>
  </g>
</svg>
